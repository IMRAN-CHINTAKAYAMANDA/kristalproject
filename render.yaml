services:
  - type: web
    name: kristalproject-api
    runtime: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 22.12.0
      - key: DB_PATH
        value: /var/data/assets.sqlite
    disk:
      name: kristalproject-data
      mountPath: /var/data
      sizeGB: 1
